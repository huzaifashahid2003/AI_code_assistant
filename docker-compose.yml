# docker-compose.yml — AI Code Review Assistant
#
# Usage:
#   docker compose up --build               # start both services
#   GEMINI_API_KEY=<key> docker compose up  # with live AI reviews
#   docker compose down                     # stop and remove containers
#
# Services:
#   backend  — FastAPI on http://localhost:8000  (API docs at /docs)
#   frontend — Streamlit on http://localhost:8501

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-code-review:latest
    container_name: ai_code_review_backend
    working_dir: /app/backend
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    environment:
      # Pass GROQ_API_KEY from host shell or a .env file in this directory.
      # If unset the app runs in placeholder mode (no real AI calls).
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      # Named volume so uploaded files survive container restarts.
      - uploads_data:/app/data/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Streamlit frontend ───────────────────────────────────────────────────
  frontend:
    image: ai-code-review:latest
    container_name: ai_code_review_frontend
    working_dir: /app/frontend
    command: >
      streamlit run app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  uploads_data:
    name: ai_code_review_uploads
